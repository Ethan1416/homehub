name: HomeHub
options:
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  bundleIdPrefix: com.ethan.homehub
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: P8Q8BL8RWM
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_NSAppTransportSecurity: "{ NSAllowsArbitraryLoads = YES; }"
targets:
  HomeHub:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: App
        excludes: ["HomeHub.entitlements"]
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethan.homehub
        INFOPLIST_KEY_CFBundleDisplayName: HomeHub
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: App/HomeHub.entitlements
        # Hide the iOS status bar at the system level so the WKWebView can
        # render edge-to-edge under it. Combined with SwiftUI's
        # .statusBarHidden(true) and .persistentSystemOverlays(.hidden), this
        # reclaims the top safe-area-inset for our content.
        INFOPLIST_KEY_UIStatusBarHidden: YES
        INFOPLIST_KEY_UIViewControllerBasedStatusBarAppearance: NO
        INFOPLIST_KEY_UIRequiresFullScreen: YES
    dependencies:
      - target: HomeHubWidget
        embed: true
  HomeHubWidget:
    type: app-extension
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Widget
        excludes: ["Info.plist", "HomeHubWidget.entitlements"]
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethan.homehub.widget
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Widget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Widget/HomeHubWidget.entitlements
